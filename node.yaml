kind: Service
apiVersion: v1
metadata:
  name: nodeapp
  labels:
    app: node
spec:
  selector:
    app: node
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp
  labels:
    app: node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
        azure.workload.identity/use: "true"
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "nodeapp"
        dapr.io/app-port: "3000"
        dapr.io/enable-api-logging: "true"
        dapr.io/config: "appconfig"
    spec:
      serviceAccountName: dapr-identity-sa
      containers:
      - name: node
        image: ghcr.io/dapr/samples/hello-k8s-node:latest
        env:
          - name: APP_PORT
            value: "3000"
        ports:
        - containerPort: 3000
        imagePullPolicy: Always
--- 
apiVersion: networking.k8s.io/v1 
kind: Ingress 
metadata: 
  name: node 
  annotations: 
    kubernetes.io/ingress.class: azure/application-gateway 
    appgw.ingress.kubernetes.io/use-private-ip: "true" 
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399" 
    appgw.ingress.kubernetes.io/ssl-redirect: "true" 
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "bnmiddleware-dev-ssl-cert" 
    appgw.ingress.kubernetes.io/backend-path-prefix: "/" 
    appgw.ingress.kubernetes.io/health-probe-path: "/ports"
spec: 
  #ingressClassName: azure/application-gateway 
  rules: 
    - http: 
      paths: 
        - path: /node/ 
          pathType: Prefix 
          backend: 
            service: 
              name: nodeapp
              port:
                number: 8080